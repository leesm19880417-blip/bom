<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOM 조회기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0d11;
  --s1: #131720;
  --s2: #1a1f2e;
  --s3: #222840;
  --bd: #2a3050;
  --acc: #4f8fff;
  --acc2: #00d4aa;
  --txt: #e4e8f0;
  --dim: #7b88a5;
  --mut: #4a5570;
  --r: 14px;
  --yellow: #fbbf24;
  --red: #f87171;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg); color: var(--txt);
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

/* === TOP BAR === */
.topbar {
  position: sticky; top:0; z-index:100;
  background: rgba(11,13,17,0.92);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  padding: 14px 16px;
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display:flex; align-items:center; gap:10px; }
.logo {
  width:34px; height:34px; border-radius:9px;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:11px; color:#000;
}
.topbar h1 { font-size:16px; font-weight:700; letter-spacing:-0.3px; }
.topbar h1 small { display:block; font-size:10px; font-weight:500; color:var(--dim); margin-top:1px; }

.stats-row {
  display:flex; gap:12px;
}
.st { text-align:center; }
.st-v { font-size:13px; font-weight:800; color:var(--acc2); }
.st-l { font-size:8px; color:var(--mut); font-weight:600; letter-spacing:0.5px; }

/* === MODE SWITCH === */
.mode-wrap { padding: 12px 16px 0; }
.mode-switch {
  display:flex; gap:0; background:var(--s2); border-radius:12px; padding:3px; width:100%;
}
.mode-btn {
  flex:1; padding:12px 0; border:none; border-radius:10px;
  font-family:inherit; font-size:13px; font-weight:700;
  color:var(--dim); background:none; cursor:pointer;
  transition: all 0.25s;
}
.mode-btn.on {
  background: var(--acc); color:#fff;
  box-shadow: 0 3px 12px rgba(79,143,255,0.35);
}

/* === SEARCH === */
.search-wrap { padding: 12px 16px; }
.search-box {
  display:flex; gap:8px; width:100%;
}
.search-input-wrap {
  flex:1; position:relative;
}
.search-input-wrap svg {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  color:var(--mut);
}
.search-input {
  width:100%; height:48px; border-radius:12px;
  background:var(--s2); border:1.5px solid var(--bd);
  color:var(--txt); font-family:inherit; font-size:14px;
  padding: 0 14px 0 40px;
  outline:none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--acc); }
.search-input::placeholder { color:var(--mut); }
.btn-search {
  width:48px; height:48px; border-radius:12px;
  background: linear-gradient(135deg, var(--acc), #3060dd);
  border:none; color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.btn-search:active { transform: scale(0.95); }

/* === LINE CHIPS === */
.chips-wrap {
  padding: 0 16px 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chips-wrap::-webkit-scrollbar { display:none; }
.chips {
  display:flex; gap:6px; width:max-content;
  padding: 4px 0;
}
.chip {
  padding: 7px 14px; border-radius:20px;
  font-size:11px; font-weight:700; white-space:nowrap;
  border: 1.5px solid var(--bd);
  background:var(--s1); color:var(--dim);
  cursor:pointer; transition: all 0.2s;
  font-family:inherit;
}
.chip.on {
  background: rgba(79,143,255,0.12);
  border-color: var(--acc);
  color: var(--acc);
}

/* === RESULT INFO === */
.result-bar {
  padding: 8px 16px;
  display:flex; justify-content:space-between; align-items:center;
}
.result-count { font-size:12px; color:var(--dim); }
.result-count b { color:var(--acc2); font-weight:800; }
.btn-csv {
  padding: 6px 12px; border-radius:8px;
  background:var(--s2); border:1px solid var(--bd);
  color:var(--dim); font-size:11px; font-weight:600;
  font-family:inherit; cursor:pointer;
  display:flex; align-items:center; gap:4px;
}

/* === CARD LIST === */
.card-list { padding: 0 16px 24px; }
.card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  margin-bottom: 10px;
  overflow: hidden;
  animation: cardIn 0.25s ease both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}
.card-head {
  padding: 12px 14px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom: 1px solid rgba(42,48,80,0.5);
  background: var(--s2);
}
.card-fg { display:flex; align-items:center; gap:8px; }
.card-code { font-size:14px; font-weight:800; color:var(--acc); }
.card-name { font-size:12px; color:var(--dim); font-weight:500; }
.card-line {
  padding: 4px 10px; border-radius:8px;
  font-size:10px; font-weight:700;
  background: rgba(0,212,170,0.1);
  color: var(--acc2);
  border: 1px solid rgba(0,212,170,0.2);
}
.card-body { padding: 10px 14px; }
.card-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 4px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(42,48,80,0.3);
  align-items: center;
}
.card-row:last-child { border-bottom:none; }
.card-rm-info { display:flex; flex-direction:column; gap:2px; }
.card-rm-code { font-size:13px; font-weight:700; color:var(--acc2); }
.card-rm-name { font-size:11px; color:var(--dim); }
.card-meta {
  display:flex; align-items:center; gap:8px;
  justify-self: end;
}
.card-level {
  padding: 2px 8px; border-radius:6px;
  font-size:10px; font-weight:700;
  background: rgba(251,191,36,0.1);
  color: var(--yellow);
  border: 1px solid rgba(251,191,36,0.2);
}
.card-qty {
  font-size:13px; font-weight:800; color:var(--txt);
  min-width: 50px; text-align:right;
}
.card-unit { font-size:10px; color:var(--mut); font-weight:500; }

/* RM mode cards */
.card-rm-head .card-code { color: var(--acc2); }
.card-fg-row { display:flex; align-items:center; gap:10px; padding: 8px 0; border-bottom:1px solid rgba(42,48,80,0.3); }
.card-fg-row:last-child { border-bottom:none; }
.card-fg-code { font-size:13px; font-weight:700; color:var(--acc); }
.card-fg-name { font-size:11px; color:var(--dim); flex:1; }
.card-fg-line {
  padding: 3px 8px; border-radius:6px;
  font-size:9px; font-weight:700;
  background: rgba(0,212,170,0.08);
  color: var(--acc2);
}

/* === EMPTY === */
.empty {
  text-align:center; padding: 60px 20px;
  color: var(--mut);
}
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty h3 { font-size:15px; color:var(--dim); margin-bottom:6px; font-weight:700; }
.empty p { font-size:12px; line-height:1.6; }

/* === LOAD MORE === */
.load-more {
  display:block; width:100%; padding:14px;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:12px; color:var(--acc); font-size:13px;
  font-weight:700; font-family:inherit; cursor:pointer;
  margin-top:4px;
}
.load-more:active { background:var(--s3); }

/* === SEARCH SUGGESTIONS (mobile dropdown) === */
.suggest-list {
  position:absolute; top:52px; left:0; right:0;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:12px; z-index:50;
  max-height: 240px; overflow-y:auto;
  display:none;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.suggest-list.show { display:block; }
.suggest-item {
  padding: 12px 14px; cursor:pointer;
  border-bottom: 1px solid rgba(42,48,80,0.3);
  font-size:13px; transition: background 0.15s;
}
.suggest-item:last-child { border-bottom:none; }
.suggest-item:active { background:var(--s3); }
.suggest-item .s-code { font-weight:700; color:var(--acc); }
.suggest-item .s-name { color:var(--dim); margin-left:6px; font-size:12px; }
.suggest-item.rm-suggest .s-code { color:var(--acc2); }

.hl { background:rgba(79,143,255,0.25); border-radius:3px; padding:0 1px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">BOM</div>
    <h1>BOM 조회기<small>Eaton Korea · Pyungtaek</small></h1>
  </div>
  <div class="stats-row">
    <div class="st"><div class="st-v" id="sF">-</div><div class="st-l">FG</div></div>
    <div class="st"><div class="st-v" id="sR">-</div><div class="st-l">RM</div></div>
    <div class="st"><div class="st-v" id="sL">-</div><div class="st-l">LINE</div></div>
  </div>
</div>

<div class="mode-wrap">
  <div class="mode-switch">
    <button class="mode-btn on" id="btnFG" onclick="setMode('fg')">📦 FG → RM</button>
    <button class="mode-btn" id="btnRM" onclick="setMode('rm')">🔍 RM → FG</button>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <div class="search-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="FG 코드 또는 품명 검색..." autocomplete="off">
      <div class="suggest-list" id="suggestList"></div>
    </div>
    <button class="btn-search" onclick="doSearch()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </button>
  </div>
</div>

<div class="chips-wrap">
  <div class="chips" id="chips"></div>
</div>

<div class="result-bar" id="resultBar" style="display:none;">
  <div class="result-count" id="resultCount"></div>
  <button class="btn-csv" onclick="exportCSV()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    CSV
  </button>
</div>

<div class="card-list" id="cardList">
  <div class="empty" id="emptyState">
    <div class="empty-icon">📦</div>
    <h3>BOM 데이터를 조회하세요</h3>
    <p>FG 또는 RM 코드를 검색하여<br>BOM 구조를 확인할 수 있습니다</p>
  </div>
</div>

const uFG = [...new Set(BOM.filter(r=>r.fg).map(r=>r.fg))];
const uRM = [...new Set(BOM.filter(r=>r.lv!=='Parent'&&r.rm).map(r=>r.rm))];
const uLN = [...new Set(BOM.filter(r=>r.ln&&r.ln!=='0').map(r=>r.ln))].sort();

let mode='fg', lineF='', results=[], shown=0;
const PAGE=30;

document.getElementById('sF').textContent=uFG.length;
document.getElementById('sR').textContent=uRM.length;
document.getElementById('sL').textContent=uLN.length;

// Chips
const chipsEl=document.getElementById('chips');
const allChip=document.createElement('button');
allChip.className='chip on'; allChip.textContent='전체';
allChip.onclick=()=>{lineF=''; updateChips(); doSearch();};
chipsEl.appendChild(allChip);
uLN.forEach(l=>{
  const c=document.createElement('button');
  c.className='chip'; c.textContent=l; c.dataset.line=l;
  c.onclick=()=>{lineF=l; updateChips(); doSearch();};
  chipsEl.appendChild(c);
});
function updateChips(){
  document.querySelectorAll('.chip').forEach(c=>{
    if(!c.dataset.line) c.classList.toggle('on',!lineF);
    else c.classList.toggle('on',c.dataset.line===lineF);
  });
}

// Mode
function setMode(m){
  mode=m;
  document.getElementById('btnFG').classList.toggle('on',m==='fg');
  document.getElementById('btnRM').classList.toggle('on',m==='rm');
  document.getElementById('searchInput').placeholder = m==='fg'?'FG 코드 또는 품명 검색...':'RM 코드 또는 품명 검색...';
  document.getElementById('searchInput').value='';
  hideSuggest();
  resetView();
}

// Suggest
const inp=document.getElementById('searchInput');
const sugBox=document.getElementById('suggestList');
let sugTimer;
inp.addEventListener('input',()=>{
  clearTimeout(sugTimer);
  sugTimer=setTimeout(showSuggest, 150);
});
inp.addEventListener('focus',()=>{ setTimeout(showSuggest,100); });
inp.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){hideSuggest();doSearch();} });
document.addEventListener('click',(e)=>{ if(!e.target.closest('.search-input-wrap')) hideSuggest(); });

function showSuggest(){
  const q=inp.value.trim().toUpperCase();
  if(q.length<1){hideSuggest();return;}
  let items=[];
  if(mode==='fg'){
    const seen=new Set();
    BOM.forEach(r=>{
      if(!seen.has(r.fg)&&(r.fg.toUpperCase().includes(q)||r.fn.toUpperCase().includes(q))){
        seen.add(r.fg); items.push({code:r.fg,name:r.fn,type:'fg'});
      }
    });
  } else {
    const seen=new Set();
    BOM.filter(r=>r.lv!=='Parent').forEach(r=>{
      if(!seen.has(r.rm)&&(r.rm.toUpperCase().includes(q)||r.rn.toUpperCase().includes(q))){
        seen.add(r.rm); items.push({code:r.rm,name:r.rn,type:'rm'});
      }
    });
  }
  items=items.slice(0,20);
  if(!items.length){hideSuggest();return;}
  sugBox.innerHTML=items.map(it=>`
    <div class="suggest-item ${it.type==='rm'?'rm-suggest':''}" data-code="${it.code}">
      <span class="s-code">${hl(it.code,q)}</span><span class="s-name">${hl(it.name,q)}</span>
    </div>
  `).join('');
  sugBox.querySelectorAll('.suggest-item').forEach(el=>{
    el.addEventListener('click',()=>{
      inp.value=el.dataset.code;
      hideSuggest(); doSearch();
    });
  });
  sugBox.classList.add('show');
}
function hideSuggest(){ sugBox.classList.remove('show'); }

function hl(t,q){
  if(!q||!t)return t||'';
  const i=t.toUpperCase().indexOf(q);
  if(i===-1)return t;
  return t.slice(0,i)+'<span class="hl">'+t.slice(i,i+q.length)+'</span>'+t.slice(i+q.length);
}

// Search
function doSearch(){
  const q=inp.value.trim().toUpperCase();
  if(!q&&!lineF){resetView();return;}
  if(mode==='fg'){
    results=BOM.filter(r=>{
      if(r.lv==='Parent')return false;
      let m=true;
      if(q) m=r.fg.toUpperCase().includes(q)||r.fn.toUpperCase().includes(q);
      if(lineF) m=m&&r.ln===lineF;
      return m;
    });
    renderFG();
  } else {
    results=BOM.filter(r=>{
      if(r.lv==='Parent')return false;
      let m=true;
      if(q) m=r.rm.toUpperCase().includes(q)||r.rn.toUpperCase().includes(q);
      if(lineF) m=m&&r.ln===lineF;
      return m;
    });
    renderRM();
  }
}

function renderFG(){
  const cl=document.getElementById('cardList');
  if(!results.length){ cl.innerHTML=emptyHTML('검색 결과 없음','코드 또는 품명을 확인해주세요'); showBar(0); return; }
  // Group by FG
  const groups=new Map();
  results.forEach(r=>{
    const k=r.fg;
    if(!groups.has(k)) groups.set(k,{fg:r.fg,fn:r.fn,ln:r.ln,items:[]});
    groups.get(k).items.push(r);
  });
  const gArr=[...groups.values()];
  shown=0;
  cl.innerHTML='';
  renderFGPage(gArr, cl);
  showBar(results.length);
}

function renderFGPage(gArr, cl){
  const end=Math.min(shown+PAGE, gArr.length);
  const q=inp.value.trim().toUpperCase();
  for(let i=shown;i<end;i++){
    const g=gArr[i];
    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=(i-shown)*30+'ms';
    let rows=g.items.map(r=>`
      <div class="card-row">
        <div class="card-rm-info">
          <div class="card-rm-code">${hl(r.rm,q)}</div>
          <div class="card-rm-name">${r.rn}</div>
        </div>
        <div class="card-meta">
          <span class="card-level">Lv.${r.lv}</span>
          <span class="card-qty">${r.qt} <span class="card-unit">${r.un}</span></span>
        </div>
      </div>
    `).join('');
    card.innerHTML=`
      <div class="card-head">
        <div class="card-fg">
          <span class="card-code">${hl(g.fg,q)}</span>
          <span class="card-name">${hl(g.fn,q)}</span>
        </div>
        <span class="card-line">${g.ln}</span>
      </div>
      <div class="card-body">${rows}</div>
    `;
    cl.appendChild(card);
  }
  shown=end;
  // Remove old load-more
  const old=cl.querySelector('.load-more');
  if(old) old.remove();
  if(shown<gArr.length){
    const btn=document.createElement('button');
    btn.className='load-more';
    btn.textContent=`더 보기 (${shown}/${gArr.length})`;
    btn.onclick=()=>renderFGPage(gArr, cl);
    cl.appendChild(btn);
  }
}

function renderRM(){
  const cl=document.getElementById('cardList');
  if(!results.length){ cl.innerHTML=emptyHTML('검색 결과 없음','코드 또는 품명을 확인해주세요'); showBar(0); return; }
  // Group by RM
  const groups=new Map();
  results.forEach(r=>{
    const k=r.rm;
    if(!groups.has(k)) groups.set(k,{rm:r.rm,rn:r.rn,items:[]});
    groups.get(k).items.push(r);
  });
  const gArr=[...groups.values()];
  shown=0;
  cl.innerHTML='';
  renderRMPage(gArr, cl);
  showBar(results.length);
}

function renderRMPage(gArr, cl){
  const end=Math.min(shown+PAGE, gArr.length);
  const q=inp.value.trim().toUpperCase();
  for(let i=shown;i<end;i++){
    const g=gArr[i];
    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=(i-shown)*30+'ms';
    let rows=g.items.map(r=>`
      <div class="card-fg-row">
        <span class="card-fg-line">${r.ln}</span>
        <span class="card-fg-code">${r.fg}</span>
        <span class="card-fg-name">${r.fn}</span>
        <span class="card-qty" style="font-size:12px">${r.qt} <span class="card-unit">${r.un}</span></span>
      </div>
    `).join('');
    card.innerHTML=`
      <div class="card-head card-rm-head">
        <div class="card-fg">
          <span class="card-code" style="color:var(--acc2)">${hl(g.rm,q)}</span>
          <span class="card-name">${hl(g.rn,q)}</span>
        </div>
        <span style="font-size:11px;color:var(--dim);font-weight:700;">${g.items.length}개 FG</span>
      </div>
      <div class="card-body">${rows}</div>
    `;
    cl.appendChild(card);
  }
  shown=end;
  const old=cl.querySelector('.load-more');
  if(old) old.remove();
  if(shown<gArr.length){
    const btn=document.createElement('button');
    btn.className='load-more';
    btn.textContent=`더 보기 (${shown}/${gArr.length})`;
    btn.onclick=()=>renderRMPage(gArr, cl);
    cl.appendChild(btn);
  }
}

function showBar(n){
  const bar=document.getElementById('resultBar');
  bar.style.display='flex';
  document.getElementById('resultCount').innerHTML=`총 <b>${n.toLocaleString()}</b>건`;
}
function emptyHTML(t,d){return `<div class="empty"><div class="empty-icon">🔍</div><h3>${t}</h3><p>${d}</p></div>`;}
function resetView(){
  document.getElementById('cardList').innerHTML=`<div class="empty"><div class="empty-icon">📦</div><h3>BOM 데이터를 조회하세요</h3><p>FG 또는 RM 코드를 검색하여<br>BOM 구조를 확인할 수 있습니다</p></div>`;
  document.getElementById('resultBar').style.display='none';
  results=[];
}

function exportCSV(){
  if(!results.length)return;
  let csv='';
  if(mode==='fg'){
    csv='라인,FG,FG명,Level,RM,RM명,QTY,단위\n';
    results.forEach(r=>{csv+=`${r.ln},${r.fg},${r.fn},${r.lv},${r.rm},${r.rn},${r.qt},${r.un}\n`;});
  } else {
    csv='라인,RM,RM명,FG,FG명,QTY\n';
    results.forEach(r=>{csv+=`${r.ln},${r.rm},${r.rn},${r.fg},${r.fn},${r.qt}\n`;});
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`BOM_${mode.toUpperCase()}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
