<!DOCTYPE html>
<html lang="ko">
<head>

    <title>BOM 조회 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div id="app" class="p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            <!-- 헤더 -->
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex items-center gap-3 mb-4">
                    <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-800">BOM 조회 시스템</h1>
                </div>
                
                <!-- 검색 모드 선택 -->
                <div class="flex gap-4 mb-4">
                    <button id="btnProduct" onclick="setMode('product')" 
                        class="flex-1 py-3 px-4 rounded-lg font-semibold transition-all bg-indigo-600 text-white shadow-md">
                        <svg class="inline w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                        완제품 검색
                    </button>
                    <button id="btnMaterial" onclick="setMode('material')" 
                        class="flex-1 py-3 px-4 rounded-lg font-semibold transition-all bg-gray-100 text-gray-600">
                        <svg class="inline w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                        자재 검색
                    </button>
                </div>

                <!-- 검색 입력 -->
                <div class="relative mb-3">
                    <svg class="absolute left-3 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" id="searchInput" oninput="search()" 
                        placeholder="완제품 코드 또는 이름을 입력하세요..."
                        class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none text-lg">
                </div>

                <!-- 안내 메시지 -->
                <div id="helpText" class="text-sm text-gray-600">
                    💡 완제품을 검색하면 해당 완제품의 구성 자재 목록이 표시됩니다.
                </div>
            </div>

            <!-- 결과 영역 -->
            <div id="resultsArea"></div>

            <!-- 통계 영역 -->
            <div id="statsArea" class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">데이터베이스 정보</h3>
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-blue-50 p-4 rounded-lg text-center">

                        <div class="text-sm text-gray-600 mt-1">BOM 항목</div>
                    </div>
                </div>
            </div>
        </div>

            }
            
            statsArea.style.display = 'none';
            
            let results = [];
            
            if (currentMode === 'product') {
                // 완제품 검색
                results = bomData.filter(d => 
                    (d.p.toLowerCase().includes(searchTerm) || d.pn.toLowerCase().includes(searchTerm)) 
                    && d.l !== 'Parent'
                );
            } else {
                // 자재 검색
                const filtered = bomData.filter(d => 
                    (d.m.toLowerCase().includes(searchTerm) || d.mn.toLowerCase().includes(searchTerm)) 
                    && d.l !== 'Parent'
                );
                // 중복 제거
                const uniqueMap = new Map();
                filtered.forEach(d => uniqueMap.set(d.p, d));
                results = Array.from(uniqueMap.values());
            }
            
            // 결과 표시
            displayResults(results, searchTerm);
        }
        
        // 결과 표시
        function displayResults(results, searchTerm) {
            const resultsArea = document.getElementById('resultsArea');
            
            if (results.length === 0) {
                resultsArea.innerHTML = `
                    <div class="bg-white rounded-lg shadow-lg p-6 fade-in">
                        <div class="text-center py-12 text-gray-500">
                            <svg class="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <p class="text-lg">검색 결과가 없습니다</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            let tableHtml = '';
            
            if (currentMode === 'product') {
                // 완제품 검색 결과 테이블
                tableHtml = `
                    <table class="w-full border-collapse text-sm">
                        <thead>
                            <tr class="bg-indigo-50">
                                <th class="border border-gray-300 px-3 py-2 text-left font-semibold">Level</th>
                                <th class="border border-gray-300 px-3 py-2 text-left font-semibold">자재 코드</th>
                                <th class="border border-gray-300 px-3 py-2 text-left font-semibold">자재명</th>
                                <th class="border border-gray-300 px-3 py-2 text-right font-semibold">QTY</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                results.forEach(d => {
                    tableHtml += `
                        <tr class="hover:bg-gray-50">
                            <td class="border border-gray-300 px-3 py-2">
                                <span class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded text-xs font-medium">${d.l}</span>
                            </td>
                            <td class="border border-gray-300 px-3 py-2 font-mono">${d.m}</td>
                            <td class="border border-gray-300 px-3 py-2">${d.mn}</td>
                            <td class="border border-gray-300 px-3 py-2 text-right font-semibold">${d.q}</td>
                        </tr>
                    `;
                });
            } else {
                // 자재 검색 결과 테이블
                tableHtml = `
                    <table class="w-full border-collapse text-sm">
                        <thead>
                            <tr class="bg-indigo-50">
                                <th class="border border-gray-300 px-3 py-2 text-left font-semibold">완제품 코드</th>
                                <th class="border border-gray-300 px-3 py-2 text-left font-semibold">완제품명</th>
                                <th class="border border-gray-300 px-3 py-2 text-center font-semibold">Level</th>
                                <th class="border border-gray-300 px-3 py-2 text-right font-semibold">QTY</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                results.forEach(d => {
                    tableHtml += `
                        <tr class="hover:bg-gray-50">
                            <td class="border border-gray-300 px-3 py-2 font-mono">${d.p}</td>
                            <td class="border border-gray-300 px-3 py-2 font-semibold">${d.pn}</td>
                            <td class="border border-gray-300 px-3 py-2 text-center">
                                <span class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded text-xs font-medium">${d.l}</span>
                            </td>
                            <td class="border border-gray-300 px-3 py-2 text-right font-semibold">${d.q}</td>
                        </tr>
                    `;
                });
            }
            
            tableHtml += '</tbody></table>';
            
            resultsArea.innerHTML = `
                <div class="bg-white rounded-lg shadow-lg p-6 fade-in">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-gray-800">검색 결과 (${results.length}건)</h2>
                        <span class="text-sm text-gray-500">"${searchTerm}"</span>
                    </div>
                    <div class="overflow-x-auto">
                        ${tableHtml}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
